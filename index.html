  <style>
    * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; }
    body { background: #f4f6fa; padding: 8px 8px 24px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

    .import-tools .clear-btn { background: #fee8e8; border: none; border-radius: 20px; padding: 3px 10px; font-size: 0.6rem; color: #b13a3a; cursor: pointer; height: 24px; }

    .import-tools .file-status { font-size: 0.55rem; color: #4a6f8e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60px; }

<body>
<div class="app-container" id="app">
  <h1>🧳 Asortiman <small>2.0</small></h1>

  <div class="import-tools">
    <label class="file-label" for="fileInput">📂 Excel</label>
    <input type="file" id="fileInput" accept=".xlsx,.xls">
    <input type="text" class="gh-input" id="githubUrl" placeholder="Git URL" value="https://github.com/zoranbjelajac1-debug/AWT-ASORTIMAN/blob/main/ASORTIMAN%20ZA%20IMPORT.xlsx">
    <button class="gh-btn" id="githubImportBtn">⬇️ Git</button>
    <button class="action-btn" id="backupBtn">💾</button>
    <button class="action-btn" id="restoreBtn">📂</button>
    <input type="file" id="restoreInput" accept=".json">
    <button class="clear-btn" id="clearDataBtn">🗑️</button>
    <span class="file-status" id="fileStatus">-</span>
    <span class="import-status" id="githubStatus"></span>
  </div>

  <div class="status-bar">
    <span id="dataInfo">Nema podataka</span>
    <span class="saved-indicator"><span class="dot gray" id="saveDot"></span><span id="saveStatus">nije</span></span>
  </div>

  <div class="location-section">
    <div class="address-box" style="border-left-color: #f5a623; margin-bottom: 4px;">
      <span style="width:100%; font-weight: 500; color: #0b2b4a;">
        <span class="label">👤 Kupac:</span> 
        <span id="kupacDisplay" style="font-weight:400;">-</span>
      </span>
    </div>
    <div class="loc-selector">
      <input type="text" id="locationInput" placeholder="🔍 Lokacija" list="locationList" autocomplete="off">
      <datalist id="locationList"></datalist>
    </div>
    <div class="address-box" id="addressBox">
      <span><span class="label">Adr:</span> <span id="addrDisplay">-</span></span>
      <span><span class="label">Grad:</span> <span id="cityDisplay">-</span></span>
      <span style="width:100%; margin-top: 1px;"><span class="label">Kat. lokacije:</span> <span id="katLokacijeDisplay">-</span></span>
    </div>
  </div>

  <div class="filter-bar">
    <div class="filter-group"><label>Vrsta</label><select id="filterVrsta"><option value="">Sve</option></select></div>
    <div class="filter-group"><label>Podvrsta</label><select id="filterPodvrsta"><option value="">Sve</option></select></div>
    <button class="reset-filters" id="resetFiltersBtn">✕</button>
  </div>

  <div class="view-toggle">
    <button id="viewCards" class="active">📇 Kartice</button>
    <button id="viewTable">📋 Tablica</button>
  </div>

  <div class="cards-wrapper" id="cardsContainer">
    <div class="empty-state">Uvezite Excel datoteku</div>
  </div>

  <div class="table-wrapper" id="tableContainer" style="display:none;">
    <table>
      <thead>
        <tr>
          <th>Šifra</th>
          <th>Artikl</th>
          <th>EAN</th>
          <th>Vrsta</th>
          <th>Podvrsta</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="5" class="empty-state">Uvezite Excel datoteku</td></tr>
      </tbody>
    </table>
  </div>
  
  <div class="item-count"><span id="itemCount">0 artikala</span></div>
  <div class="footer-note">IndexedDB • offline • backup/restore JSON</div>
</div>

<script>
  (function(){
    const DB_NAME = 'AsortimanDB';
    const STORE_NAME = 'articles';
    const DB_VERSION = 1;

    function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            const store = db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
            store.createIndex('lokacija', 'lokacija', { unique: false });
            store.createIndex('vrsta', 'vrsta', { unique: false });
            store.createIndex('podvrsta', 'podvrsta', { unique: false });
          }
        };
        request.onsuccess = (e) => resolve(e.target.result);
        request.onerror = (e) => reject(e.target.error);
      });
    }

    async function saveAllData(dataArray) {
      const db = await openDB();
      const tx = db.transaction(STORE_NAME, 'readwrite');
      const store = tx.objectStore(STORE_NAME);
      await store.clear();
      for (const item of dataArray) store.add(item);
      return new Promise((resolve, reject) => { tx.oncomplete = resolve; tx.onerror = (e) => reject(e.target.error); });
    }

    async function loadAllData() {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const store = tx.objectStore(STORE_NAME);
        const request = store.getAll();
        request.onsuccess = () => resolve(request.result);
        request.onerror = (e) => reject(e.target.error);
      });
    }

    async function clearAllDataDB() {
      const db = await openDB();
      const tx = db.transaction(STORE_NAME, 'readwrite');
      const store = tx.objectStore(STORE_NAME);
      store.clear();
      return new Promise((resolve, reject) => { tx.oncomplete = resolve; tx.onerror = (e) => reject(e.target.error); });
    }

    let fullData = [], locationSet = new Set(), locationMap = new Map(), currentView = 'cards';

    const locationInput = document.getElementById('locationInput');
    const locationListEl = document.getElementById('locationList');
    const addrDisplay = document.getElementById('addrDisplay');
    const cityDisplay = document.getElementById('cityDisplay');
    const kupacDisplay = document.getElementById('kupacDisplay');
    const katLokacijeDisplay = document.getElementById('katLokacijeDisplay');
    const tableBody = document.getElementById('tableBody');
    const cardsContainer = document.getElementById('cardsContainer');
    const tableContainer = document.getElementById('tableContainer');
    const filterVrsta = document.getElementById('filterVrsta');
    const filterPodvrsta = document.getElementById('filterPodvrsta');
    const resetBtn = document.getElementById('resetFiltersBtn');
    const fileInput = document.getElementById('fileInput');
    const fileStatus = document.getElementById('fileStatus');
    const itemCount = document.getElementById('itemCount');
    const clearDataBtn = document.getElementById('clearDataBtn');
    const dataInfo = document.getElementById('dataInfo');
    const saveDot = document.getElementById('saveDot');
    const saveStatus = document.getElementById('saveStatus');
    const backupBtn = document.getElementById('backupBtn');
    const restoreBtn = document.getElementById('restoreBtn');
    const restoreInput = document.getElementById('restoreInput');
    const viewCardsBtn = document.getElementById('viewCards');
    const viewTableBtn = document.getElementById('viewTable');
    const githubUrl = document.getElementById('githubUrl');
    const githubImportBtn = document.getElementById('githubImportBtn');
    const githubStatus = document.getElementById('githubStatus');

    function normalizeStr(str) { return str ? String(str).trim() : ''; }

    function updateSaveStatus(saved) {
      saveDot.className = 'dot' + (saved ? '' : ' gray');
      saveStatus.textContent = saved ? 'spremljeno' : 'nije';
    }

    function updateDataInfo() {
      dataInfo.textContent = fullData.length ? `${fullData.length} art, ${locationSet.size} lok` : 'Nema podataka';
    }

    function updateLocationDatalist() {
      const sorted = Array.from(locationSet).sort((a,b) => a.localeCompare(b, 'hr'));
      locationListEl.innerHTML = sorted.map(l => `<option value="${l}">`).join('');
    }

    function updateAddressDisplay(loc) {
      if (!loc || !locationMap.has(loc)) { 
        addrDisplay.textContent = '-'; 
        cityDisplay.textContent = '-'; 
        kupacDisplay.textContent = '-';
        katLokacijeDisplay.textContent = '-';
        return; 
      }
      const info = locationMap.get(loc);
      addrDisplay.textContent = info.adresa || '-';
      cityDisplay.textContent = info.grad || '-';
      kupacDisplay.textContent = info.kupac || '-';
      
      // Prikazujemo kategorije sortirane po učestalosti (od najčešće prema rjeđoj)
      if (info.katLokacije && Array.isArray(info.katLokacije) && info.katLokacije.length > 0) {
        // Sortiramo po frekvenciji (silazno - od najčešće prema rjeđoj)
        const sorted = [...info.katLokacije].sort((a, b) => {
          const freqA = info.katFrekvencija ? info.katFrekvencija[a] || 0 : 0;
          const freqB = info.katFrekvencija ? info.katFrekvencija[b] || 0 : 0;
          return freqB - freqA;
        });
        katLokacijeDisplay.textContent = sorted.join(' / ');
      } else {
        katLokacijeDisplay.textContent = '-';
      }
    }

    function populateFilters() {
      const vrstaSet = new Set(), podvrstaSet = new Set();
      for (const row of fullData) {
        if (row.vrsta) vrstaSet.add(row.vrsta);
        if (row.podvrsta) podvrstaSet.add(row.podvrsta);
      }
      const currentVrsta = filterVrsta.value;
      filterVrsta.innerHTML = '<option value="">Sve</option>';
      Array.from(vrstaSet).sort((a,b) => a.localeCompare(b, 'hr')).forEach(v => {
        const opt = document.createElement('option'); opt.value = v; opt.textContent = v; filterVrsta.appendChild(opt);
      });
      if (currentVrsta && vrstaSet.has(currentVrsta)) filterVrsta.value = currentVrsta;
      else filterVrsta.value = '';

      const currentPod = filterPodvrsta.value;
      filterPodvrsta.innerHTML = '<option value="">Sve</option>';
      Array.from(podvrstaSet).sort((a,b) => a.localeCompare(b, 'hr')).forEach(p => {
        const opt = document.createElement('option'); opt.value = p; opt.textContent = p; filterPodvrsta.appendChild(opt);
      });
      if (currentPod && podvrstaSet.has(currentPod)) filterPodvrsta.value = currentPod;
      else filterPodvrsta.value = '';
    }

    function updatePodvrstaFilter() {
      const selectedVrsta = filterVrsta.value;
      const podvrstaSet = new Set();
      for (const row of fullData) {
        if (!selectedVrsta || row.vrsta === selectedVrsta) {
          if (row.podvrsta) podvrstaSet.add(row.podvrsta);
        }
      }
      const currentPod = filterPodvrsta.value;
      filterPodvrsta.innerHTML = '<option value="">Sve</option>';
      Array.from(podvrstaSet).sort((a,b) => a.localeCompare(b, 'hr')).forEach(p => {
        const opt = document.createElement('option'); opt.value = p; opt.textContent = p; filterPodvrsta.appendChild(opt);
      });
      if (currentPod && podvrstaSet.has(currentPod)) filterPodvrsta.value = currentPod;
      else filterPodvrsta.value = '';
    }

    function render() {
      let loc = locationInput.value.trim();
      if (loc && !locationSet.has(loc)) {
        const match = Array.from(locationSet).find(l => l.toLowerCase().includes(loc.toLowerCase()));
        if (match) { loc = match; locationInput.value = match; } else loc = '';
      } else if (!loc || !locationSet.has(loc)) loc = '';

      updateAddressDisplay(loc);

      if (!loc || fullData.length === 0) {
        const msg = fullData.length === 0 ? 'Uvezite Excel datoteku' : 'Odaberite lokaciju';
        cardsContainer.innerHTML = `<div class="empty-state">${msg}</div>`;
        tableBody.innerHTML = `<tr><td colspan="5" class="empty-state">${msg}</td></tr>`;
        itemCount.textContent = '0 artikala';
        return;
      }

      let filtered = fullData.filter(row => row.lokacija === loc);
      const vrstaFilter = filterVrsta.value;
      if (vrstaFilter) filtered = filtered.filter(row => row.vrsta === vrstaFilter);
      const podFilter = filterPodvrsta.value;
      if (podFilter) filtered = filtered.filter(row => row.podvrsta === podFilter);

      filtered.sort((a,b) => (a.vrsta||'').localeCompare(b.vrsta||'hr') || (a.podvrsta||'').localeCompare(b.podvrsta||'hr'));

      itemCount.textContent = `${filtered.length} artikala`;

      if (currentView === 'cards') {
        cardsContainer.style.display = 'block';
        tableContainer.style.display = 'none';
        if (!filtered.length) {
          cardsContainer.innerHTML = `<div class="empty-state">Nema artikala za ovaj filter</div>`;
        } else {
          cardsContainer.innerHTML = filtered.map(row => `
            <div class="item-card">
              <span class="card-label">Šifra</span>
              <span class="card-value sifra">
                ${row.awtSifra || '-'}
                ${row.katArt ? `<span class="kat-art-badge">${row.katArt}</span>` : ''}
              </span>
              <span class="card-label">Artikl</span><span class="card-value">${row.artikl || '-'}</span>
              <span class="card-label">EAN</span><span class="card-value">${row.ean || '-'}</span>
              <span class="card-label">Kat.</span>
              <span class="card-value">
                <span class="card-tags">
                  ${row.vrsta ? `<span class="badge-vrsta">${row.vrsta}</span>` : ''}
                  ${row.podvrsta ? `<span class="badge-podvrsta">${row.podvrsta}</span>` : ''}
                </span>
              </span>
            </div>
          `).join('');
        }
      } else {
        cardsContainer.style.display = 'none';
        tableContainer.style.display = 'block';
        if (!filtered.length) {
          tableBody.innerHTML = `<tr><td colspan="5" class="empty-state">Nema artikala za ovaj filter</td></tr>`;
        } else {
          tableBody.innerHTML = filtered.map(row => `<tr>
            <td><strong>${row.awtSifra || ''}</strong></td>
            <td>${row.artikl || ''}</td>
            <td>${row.ean || ''}</td>
            <td>${row.vrsta ? `<span class="table-badge-vrsta">${row.vrsta}</span>` : ''}</td>
            <td>${row.podvrsta ? `<span class="table-badge-podvrsta">${row.podvrsta}</span>` : ''}</td>
          </tr>`).join('');
        }
      }
    }

    viewCardsBtn.addEventListener('click', () => { currentView = 'cards'; viewCardsBtn.className = 'active'; viewTableBtn.className = ''; render(); });
    viewTableBtn.addEventListener('click', () => { currentView = 'table'; viewTableBtn.className = 'active'; viewCardsBtn.className = ''; render(); });

    async function processExcelData(workbook, sourceName = '') {
      const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(firstSheet, { defval: '' });
      if (!json || !json.length) { alert('Excel datoteka je prazna.'); return false; }

      const headers = Object.keys(json[0]);
      
      console.log('=== SVI STUPCI U EXCELU ===');
      headers.forEach((h, i) => console.log(`${i+1}. "${h}"`));
      console.log('===============================');
      
      const findKey = (patterns) => {
        for (const p of patterns) {
          const found = headers.find(h => h.trim().toUpperCase() === p.toUpperCase());
          if (found) return found;
          const partial = headers.find(h => h.trim().toUpperCase().includes(p.toUpperCase()));
          if (partial) return partial;
        }
        return null;
      };

      const keyLokacija = findKey(['LOKACIJA']);
      const keyAdresa = findKey(['ADRESA']);
      const keyGrad = findKey(['GRAD']);
      const keyKupac = findKey(['KUPAC']);
      const keyKatLokacije = findKey(['KAT.', 'KAT', 'KATEGORIJA', 'KAT LOKACIJE', 'KAT LOK']);
      const keyKatArt = findKey(['KAT.ART', 'KAT ART', 'KATART', 'KAT ARTIKL']);
      const keyAwtSifra = findKey(['AWT ŠIFRA', 'AWT SIFRA', 'ŠIFRA', 'SIFRA']);
      const keyArtikl = findKey(['ARTIKL', 'NAZIV', 'OPIS']);
      const keyEAN = findKey(['EAN', 'BARCODE', 'BAR KOD']);
      const keyVrsta = findKey(['VRSTA', 'KATEGORIJA']);
      const keyPodvrsta = findKey(['PODVRSTA', 'SUBKATEGORIJA']);

      console.log('Pronađeni ključevi:');
      console.log('keyLokacija:', keyLokacija);
      console.log('keyKatLokacije:', keyKatLokacije);

      if (!keyLokacija || !keyAdresa || !keyGrad || !keyAwtSifra || !keyArtikl || !keyEAN) {
        alert('Nedostaju stupci: LOKACIJA, ADRESA, GRAD, AWT ŠIFRA, ARTIKL, EAN');
        return false;
      }

      const newData = [];
      const locSet = new Set();
      const locMap = new Map();

      // Prvo skupimo sve podatke po lokacijama
      for (const row of json) {
        const lokacija = normalizeStr(row[keyLokacija]);
        if (!lokacija) continue;
        
        const adresa = normalizeStr(row[keyAdresa]);
        const grad = normalizeStr(row[keyGrad]);
        const kupac = keyKupac ? normalizeStr(row[keyKupac]) : '';
        const katLokacije = keyKatLokacije ? normalizeStr(row[keyKatLokacije]) : '';
        
        locSet.add(lokacija);
        
        if (!locMap.has(lokacija)) {
          locMap.set(lokacija, { 
            adresa, 
            grad, 
            kupac, 
            katLokacije: [], // niz kategorija
            katFrekvencija: {} // objekt za brojanje učestalosti
          });
        }
        
        // Dodajemo kategorije i brojimo učestalost
        if (katLokacije) {
          // Ako kategorija sadrži više vrijednosti odvojenih zarezom, razbijamo ih
          const katValues = katLokacije.split(',').map(s => s.trim()).filter(s => s);
          katValues.forEach(k => {
            const info = locMap.get(lokacija);
            // Dodajemo u niz ako već ne postoji
            if (!info.katLokacije.includes(k)) {
              info.katLokacije.push(k);
            }
            // Brojimo učestalost
            if (!info.katFrekvencija[k]) {
              info.katFrekvencija[k] = 0;
            }
            info.katFrekvencija[k]++;
          });
        }
        
        // Spremamo podatke o artiklima
        const awtSifra = normalizeStr(row[keyAwtSifra]);
        const artikl = normalizeStr(row[keyArtikl]);
        const ean = normalizeStr(row[keyEAN]);
        const vrsta = keyVrsta ? normalizeStr(row[keyVrsta]) : '';
        const podvrsta = keyPodvrsta ? normalizeStr(row[keyPodvrsta]) : '';
        const katArt = keyKatArt ? normalizeStr(row[keyKatArt]) : '';
        
        if (awtSifra || artikl || ean) {
          newData.push({ 
            lokacija, 
            adresa, 
            grad, 
            kupac, 
            katLokacije, // zadržavamo i originalnu vrijednost za svaki artikl
            awtSifra, 
            artikl, 
            ean, 
            vrsta, 
            podvrsta, 
            katArt 
          });
        }
      }

      if (!newData.length) { alert('Nema valjanih podataka.'); return false; }

      fullData = newData;
      locationSet = locSet;
      locationMap = locMap;

      await saveAllData(fullData);
      updateSaveStatus(true);
      updateLocationDatalist();
      populateFilters();
      updateDataInfo();
      fileStatus.textContent = sourceName ? `✅ ${fullData.length}` : `✅ ${fullData.length}`;

      const savedLoc = localStorage.getItem('asortimanSelectedLocation');
      if (savedLoc && locationSet.has(savedLoc)) locationInput.value = savedLoc;
      else if (locationSet.size === 1) { locationInput.value = Array.from(locationSet)[0]; localStorage.setItem('asortimanSelectedLocation', locationInput.value); }
      else locationInput.value = '';
      render();
      return true;
    }

    async function importFromGitHub(url) {
      githubStatus.textContent = '⏳ Preuzimanje...';
      githubStatus.className = 'import-status loading';
      try {
        let finalUrl = url;
        if (url.includes('github.com') && !url.includes('raw.githubusercontent.com')) {
          finalUrl = url.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
        }
        const response = await fetch(finalUrl);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        const contentType = response.headers.get('content-type') || '';
        if (contentType.includes('json') || url.endsWith('.json')) {
          const jsonData = await response.json();
          if (!Array.isArray(jsonData)) throw new Error('JSON nije niz');
          fullData = jsonData;
          locationSet = new Set();
          locationMap = new Map();
          for (const row of fullData) {
            locationSet.add(row.lokacija);
            if (!locationMap.has(row.lokacija)) {
              let katLok = row.katLokacije || [];
              if (typeof katLok === 'string') {
                katLok = katLok.split(',').map(s => s.trim()).filter(s => s);
              }
              if (!Array.isArray(katLok)) katLok = [];
              // Za JSON ne znamo frekvenciju, pa ih prikazujemo kako su zapisani
              locationMap.set(row.lokacija, { 
                adresa: row.adresa || '', 
                grad: row.grad || '', 
                kupac: row.kupac || '', 
                katLokacije: katLok,
                katFrekvencija: {}
              });
            }
          }
          await saveAllData(fullData);
          updateLocationDatalist();
          populateFilters();
          updateDataInfo();
          updateSaveStatus(true);
          fileStatus.textContent = `✅ ${fullData.length} (JSON)`;
          const savedLoc = localStorage.getItem('asortimanSelectedLocation');
          if (savedLoc && locationSet.has(savedLoc)) locationInput.value = savedLoc;
          else if (locationSet.size === 1) { locationInput.value = Array.from(locationSet)[0]; localStorage.setItem('asortimanSelectedLocation', locationInput.value); }
          render();
          githubStatus.textContent = `✅ ${fullData.length} artikala`;
          githubStatus.className = 'import-status success';
          return;
        }
        
        const arrayBuffer = await response.arrayBuffer();
        const workbook = XLSX.read(arrayBuffer, { type: 'array' });
        const success = await processExcelData(workbook, 'Git');
        if (success) {
          githubStatus.textContent = `✅ ${fullData.length} artikala`;
          githubStatus.className = 'import-status success';
        } else {
          githubStatus.textContent = '❌ Greška pri obradi';
          githubStatus.className = 'import-status error';
        }
      } catch (error) {
        githubStatus.textContent = `❌ ${error.message}`;
        githubStatus.className = 'import-status error';
      }
    }

    async function loadFromDB() {
      try {
        const data = await loadAllData();
        if (!data || !data.length) return false;
        fullData = data;
        locationSet = new Set();
        locationMap = new Map();
        for (const row of fullData) {
          locationSet.add(row.lokacija);
          if (!locationMap.has(row.lokacija)) {
            let katLok = row.katLokacije || [];
            if (typeof katLok === 'string') {
              katLok = katLok.split(',').map(s => s.trim()).filter(s => s);
            }
            if (!Array.isArray(katLok)) katLok = [];
            locationMap.set(row.lokacija, { 
              adresa: row.adresa || '', 
              grad: row.grad || '', 
              kupac: row.kupac || '', 
              katLokacije: katLok,
              katFrekvencija: row.katFrekvencija || {}
            });
          }
        }
        updateLocationDatalist();
        populateFilters();
        updateDataInfo();
        updateSaveStatus(true);
        fileStatus.textContent = `📂 ${fullData.length}`;
        const savedLoc = localStorage.getItem('asortimanSelectedLocation');
        if (savedLoc && locationSet.has(savedLoc)) locationInput.value = savedLoc;
        else if (locationSet.size === 1) { locationInput.value = Array.from(locationSet)[0]; localStorage.setItem('asortimanSelectedLocation', locationInput.value); }
        render();
        return true;
      } catch(e) { return false; }
    }

    fileInput.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async function(ev) {
        try {
          const data = new Uint8Array(ev.target.result);
          const workbook = XLSX.read(data, { type: 'array' });
          await processExcelData(workbook, file.name);
          fileStatus.textContent = `📄 ${file.name}`;
        } catch(err) { alert('Greška: ' + err.message); }
      };
      reader.readAsArrayBuffer(file);
    });

    githubImportBtn.addEventListener('click', () => {
      const url = githubUrl.value.trim();
      if (!url) { githubStatus.textContent = '⚠️ Unesite URL'; githubStatus.className = 'import-status error'; return; }
      importFromGitHub(url);
    });
    githubUrl.addEventListener('keydown', (e) => { if (e.key === 'Enter') githubImportBtn.click(); });

    backupBtn.addEventListener('click', async () => {
      const data = await loadAllData();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `asortiman_${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    });

    restoreBtn.addEventListener('click', () => restoreInput.click());
    restoreInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const text = await file.text();
      try {
        const data = JSON.parse(text);
        if (!Array.isArray(data) || !data.length) { alert('Neispravan JSON.'); return; }
        fullData = data;
        locationSet = new Set();
        locationMap = new Map();
        for (const row of fullData) {
          locationSet.add(row.lokacija);
          if (!locationMap.has(row.lokacija)) {
            let katLok = row.katLokacije || [];
            if (typeof katLok === 'string') {
              katLok = katLok.split(',').map(s => s.trim()).filter(s => s);
            }
            if (!Array.isArray(katLok)) katLok = [];
            locationMap.set(row.lokacija, { 
              adresa: row.adresa || '', 
              grad: row.grad || '', 
              kupac: row.kupac || '', 
              katLokacije: katLok,
              katFrekvencija: row.katFrekvencija || {}
            });
          }
        }
        await saveAllData(fullData);
        updateLocationDatalist();
        populateFilters();
        updateDataInfo();
        updateSaveStatus(true);
        fileStatus.textContent = `📂 ${fullData.length} (restore)`;
        const savedLoc = localStorage.getItem('asortimanSelectedLocation');
        if (savedLoc && locationSet.has(savedLoc)) locationInput.value = savedLoc;
        else if (locationSet.size === 1) { locationInput.value = Array.from(locationSet)[0]; localStorage.setItem('asortimanSelectedLocation', locationInput.value); }
        render();
        alert('Restore uspješan!');
      } catch(err) { alert('Greška: ' + err.message); }
      restoreInput.value = '';
    });

    clearDataBtn.addEventListener('click', async () => {
      if (!fullData.length) return;
      if (!confirm('Obrisati sve podatke?')) return;
      await clearAllDataDB();
      fullData = []; locationSet.clear(); locationMap.clear();
      localStorage.removeItem('asortimanSelectedLocation');
      locationInput.value = '';
      updateLocationDatalist();
      populateFilters();
      updateDataInfo();
      updateSaveStatus(false);
      fileStatus.textContent = '-';
      render();
    });

    locationInput.addEventListener('input', function() {
      const val = this.value.trim();
      if (val === '') { localStorage.removeItem('asortimanSelectedLocation'); render(); return; }
      if (locationSet.has(val)) {
        localStorage.setItem('asortimanSelectedLocation', val);
        render();
      } else {
        const matches = Array.from(locationSet).filter(l => l.toLowerCase().includes(val.toLowerCase()));
        if (matches.length === 1) {
          this.value = matches[0];
          localStorage.setItem('asortimanSelectedLocation', matches[0]);
          render();
        }
      }
    });

    locationInput.addEventListener('change', function() {
      const val = this.value.trim();
      if (locationSet.has(val)) {
        localStorage.setItem('asortimanSelectedLocation', val);
        render();
      } else {
        const match = Array.from(locationSet).find(l => l.toLowerCase() === val.toLowerCase());
        if (match) { this.value = match; localStorage.setItem('asortimanSelectedLocation', match); render(); }
        else {
          const partial = Array.from(locationSet).find(l => l.toLowerCase().includes(val.toLowerCase()));
          if (partial) { this.value = partial; localStorage.setItem('asortimanSelectedLocation', partial); render(); }
          else render();
        }
      }
    });

    filterVrsta.addEventListener('change', () => { updatePodvrstaFilter(); render(); });
    filterPodvrsta.addEventListener('change', render);
    resetBtn.addEventListener('click', () => {
      filterVrsta.value = ''; filterPodvrsta.value = '';
      updatePodvrstaFilter();
      render();
    });

    loadFromDB();

    if ('serviceWorker' in navigator) {
      const swCode = `const CACHE="asortiman-v2"; const FILES=["./"]; self.addEventListener("install",e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(FILES)))); self.addEventListener("fetch",e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
      const blob = new Blob([swCode], { type: 'text/javascript' });
      const url = URL.createObjectURL(blob);
      navigator.serviceWorker.register(url).catch(() => {});
    }

  })();
</script>
