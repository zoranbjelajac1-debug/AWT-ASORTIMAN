  <style>
    * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; }
    body { background: #f4f6fa; padding: 16px 12px 40px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

    .github-import { background: #f0f4fe; border-radius: 20px; padding: 12px 16px; margin: 10px 0 12px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; border: 1px solid #d5e0ec; }

<body>
<div class="app-container" id="app">
  <h1>🧳 Asortiman <small>2.0</small></h1>

  <div class="upload-area">
    <label for="fileInput">📂 Uvezi Excel</label>
    <input type="file" id="fileInput" accept=".xlsx,.xls">
    <span class="file-status" id="fileStatus">nema datoteke</span>
    <button class="clear-data-btn" id="clearDataBtn">🗑️ Obriši</button>
  </div>

  <!-- GitHub Import -->
  <div class="github-import">
    <input type="text" id="githubUrl" placeholder="GitHub URL Excel datoteke" value="https://raw.githubusercontent.com/korisnik/repo/main/ASORTIMAN.xlsx">
    <button id="githubImportBtn">📥 Uvezi s GitHub-a</button>
    <span class="status" id="githubStatus">Unesite URL i kliknite za uvoz</span>
  </div>

  <div class="status-bar">
    <span id="dataInfo">Nema uvezenih podataka</span>
    <span class="saved-indicator"><span class="dot gray" id="saveDot"></span><span id="saveStatus">nije spremljeno</span></span>
  </div>

  <div class="backup-restore">
    <button id="backupBtn">💾 Backup (JSON)</button>
    <button id="restoreBtn">📂 Restore (JSON)</button>
    <input type="file" id="restoreInput" accept=".json">
  </div>

  <div class="location-section">
    <div class="loc-selector">
      <label for="locationInput">📍 Odaberi lokaciju (piši za pretragu)</label>
      <input type="text" id="locationInput" placeholder="npr. STUDENAC 191 ili PIROVAC" list="locationList" autocomplete="off">
      <datalist id="locationList"></datalist>
    </div>
    <div class="address-box" id="addressBox">
      <span><span class="label">Adresa:</span> <span id="addrDisplay">-</span></span>
      <span><span class="label">Grad:</span> <span id="cityDisplay">-</span></span>
    </div>
  </div>

  <div class="filter-bar">
    <div class="filter-group"><label for="filterVrsta">VRSTA</label><select id="filterVrsta"><option value="">Sve vrste</option></select></div>
    <div class="filter-group"><label for="filterPodvrsta">PODVRSTA</label><select id="filterPodvrsta"><option value="">Sve podvrste</option></select></div>
    <button class="reset-filters" id="resetFiltersBtn">✕ Poništi filtere</button>
  </div>

  <!-- View Toggle -->
  <div class="view-toggle">
    <button id="viewCards" class="active">📇 Kartice</button>
    <button id="viewTable">📋 Tablica</button>
  </div>

  <!-- Cards View -->
  <div class="cards-wrapper" id="cardsContainer">
    <div class="empty-state">Uvezite Excel datoteku za prikaz</div>
  </div>

  <!-- Table View (skriven po defaultu) -->
  <div class="table-wrapper" id="tableContainer" style="display:none;">
    <table>
      <thead><tr><th>AWT ŠIFRA</th><th>ARTIKL</th><th>EAN</th><th>VRSTA</th><th>PODVRSTA</th></tr></thead>
      <tbody id="tableBody"><tr><td colspan="5" class="empty-state">Uvezite Excel datoteku</td></tr></tbody>
    </table>
  </div>
  
  <div style="margin-top: 8px; display: flex; justify-content: flex-end; font-size: 0.8rem; color: #3f6182;">
    <span id="itemCount">0 artikala</span>
  </div>

  <button class="import-btn" id="importBtn">📤 Uvezi ASORTIMAN iz Excela</button>
  <div class="footer-note">Podaci se trajno spremaju u IndexedDB. Filtriraj po VRSTI i PODVRSTI.</div>
</div>

<script>
  (function(){
    // ---------- IndexedDB ----------
    const DB_NAME = 'AsortimanDB';
    const STORE_NAME = 'articles';
    const DB_VERSION = 1;

    function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            const store = db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
            store.createIndex('lokacija', 'lokacija', { unique: false });
            store.createIndex('vrsta', 'vrsta', { unique: false });
            store.createIndex('podvrsta', 'podvrsta', { unique: false });
          }
        };
        request.onsuccess = (e) => resolve(e.target.result);
        request.onerror = (e) => reject(e.target.error);
      });
    }

    async function saveAllData(dataArray) {
      const db = await openDB();
      const tx = db.transaction(STORE_NAME, 'readwrite');
      const store = tx.objectStore(STORE_NAME);
      await store.clear();
      for (const item of dataArray) {
        store.add(item);
      }
      return new Promise((resolve, reject) => {
        tx.oncomplete = resolve;
        tx.onerror = (e) => reject(e.target.error);
      });
    }

    async function loadAllData() {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const store = tx.objectStore(STORE_NAME);
        const request = store.getAll();
        request.onsuccess = () => resolve(request.result);
        request.onerror = (e) => reject(e.target.error);
      });
    }

    async function clearAllDataDB() {
      const db = await openDB();
      const tx = db.transaction(STORE_NAME, 'readwrite');
      const store = tx.objectStore(STORE_NAME);
      store.clear();
      return new Promise((resolve, reject) => {
        tx.oncomplete = resolve;
        tx.onerror = (e) => reject(e.target.error);
      });
    }

    // ---------- Global state ----------
    let fullData = [];
    let locationSet = new Set();
    let locationMap = new Map();
    let currentLocation = '';
    let currentView = 'cards'; // 'cards' ili 'table'

    // DOM refs
    const locationInput = document.getElementById('locationInput');
    const locationListEl = document.getElementById('locationList');
    const addrDisplay = document.getElementById('addrDisplay');
    const cityDisplay = document.getElementById('cityDisplay');
    const tableBody = document.getElementById('tableBody');
    const cardsContainer = document.getElementById('cardsContainer');
    const tableContainer = document.getElementById('tableContainer');
    const filterVrsta = document.getElementById('filterVrsta');
    const filterPodvrsta = document.getElementById('filterPodvrsta');
    const resetBtn = document.getElementById('resetFiltersBtn');
    const fileInput = document.getElementById('fileInput');
    const fileStatus = document.getElementById('fileStatus');
    const itemCount = document.getElementById('itemCount');
    const importBtn = document.getElementById('importBtn');
    const clearDataBtn = document.getElementById('clearDataBtn');
    const dataInfo = document.getElementById('dataInfo');
    const saveDot = document.getElementById('saveDot');
    const saveStatus = document.getElementById('saveStatus');
    const backupBtn = document.getElementById('backupBtn');
    const restoreBtn = document.getElementById('restoreBtn');
    const restoreInput = document.getElementById('restoreInput');
    const viewCardsBtn = document.getElementById('viewCards');
    const viewTableBtn = document.getElementById('viewTable');
    const githubUrl = document.getElementById('githubUrl');
    const githubImportBtn = document.getElementById('githubImportBtn');
    const githubStatus = document.getElementById('githubStatus');

    function normalizeStr(str) { return str ? String(str).trim() : ''; }

    function updateSaveStatus(saved) {
      saveDot.className = 'dot' + (saved ? '' : ' gray');
      saveStatus.textContent = saved ? 'spremljeno' : 'nije spremljeno';
    }

    function updateDataInfo() {
      dataInfo.textContent = fullData.length ? `${fullData.length} artikala, ${locationSet.size} lokacija` : 'Nema uvezenih podataka';
    }

    function updateLocationDatalist() {
      const sorted = Array.from(locationSet).sort((a,b) => a.localeCompare(b, 'hr'));
      locationListEl.innerHTML = sorted.map(l => `<option value="${l}">`).join('');
    }

    function updateAddressDisplay(loc) {
      if (!loc || !locationMap.has(loc)) { addrDisplay.textContent = '-'; cityDisplay.textContent = '-'; return; }
      const info = locationMap.get(loc);
      addrDisplay.textContent = info.adresa || '-';
      cityDisplay.textContent = info.grad || '-';
    }

    function populateFilters() {
      const vrstaSet = new Set(), podvrstaSet = new Set();
      for (const row of fullData) {
        if (row.vrsta) vrstaSet.add(row.vrsta);
        if (row.podvrsta) podvrstaSet.add(row.podvrsta);
      }
      const currentVrsta = filterVrsta.value;
      filterVrsta.innerHTML = '<option value="">Sve vrste</option>';
      Array.from(vrstaSet).sort((a,b) => a.localeCompare(b, 'hr')).forEach(v => {
        const opt = document.createElement('option'); opt.value = v; opt.textContent = v; filterVrsta.appendChild(opt);
      });
      if (currentVrsta && vrstaSet.has(currentVrsta)) filterVrsta.value = currentVrsta;
      else filterVrsta.value = '';

      const currentPod = filterPodvrsta.value;
      filterPodvrsta.innerHTML = '<option value="">Sve podvrste</option>';
      Array.from(podvrstaSet).sort((a,b) => a.localeCompare(b, 'hr')).forEach(p => {
        const opt = document.createElement('option'); opt.value = p; opt.textContent = p; filterPodvrsta.appendChild(opt);
      });
      if (currentPod && podvrstaSet.has(currentPod)) filterPodvrsta.value = currentPod;
      else filterPodvrsta.value = '';
    }

    function updatePodvrstaFilter() {
      const selectedVrsta = filterVrsta.value;
      const podvrstaSet = new Set();
      for (const row of fullData) {
        if (!selectedVrsta || row.vrsta === selectedVrsta) {
          if (row.podvrsta) podvrstaSet.add(row.podvrsta);
        }
      }
      const currentPod = filterPodvrsta.value;
      filterPodvrsta.innerHTML = '<option value="">Sve podvrste</option>';
      Array.from(podvrstaSet).sort((a,b) => a.localeCompare(b, 'hr')).forEach(p => {
        const opt = document.createElement('option'); opt.value = p; opt.textContent = p; filterPodvrsta.appendChild(opt);
      });
      if (currentPod && podvrstaSet.has(currentPod)) filterPodvrsta.value = currentPod;
      else filterPodvrsta.value = '';
    }

    // ---------- RENDER: Cards ----------
    function renderCards(data) {
      if (!data || !data.length) {
        cardsContainer.innerHTML = `<div class="empty-state">${fullData.length === 0 ? 'Uvezite Excel datoteku' : 'Nema artikala za odabrane filtere'}</div>`;
        return;
      }
      cardsContainer.innerHTML = data.map(row => `
        <div class="item-card">
          <div class="card-row">
            <span class="card-label">AWT Šifra</span>
            <span class="card-value sifra">${row.awtSifra || '-'}</span>
          </div>
          <div class="card-row">
            <span class="card-label">Artikl</span>
            <span class="card-value">${row.artikl || '-'}</span>
          </div>
          <div class="card-row">
            <span class="card-label">EAN</span>
            <span class="card-value">${row.ean || '-'}</span>
          </div>
          <div class="card-row" style="border-bottom: none;">
            <span class="card-label">Kategorija</span>
            <span class="card-value">
              <div class="card-tags">
                ${row.vrsta ? `<span class="badge-vrsta">${row.vrsta}</span>` : ''}
                ${row.podvrsta ? `<span class="badge-podvrsta">${row.podvrsta}</span>` : ''}
              </div>
            </span>
          </div>
        </div>
      `).join('');
    }

    // ---------- RENDER: Table ----------
    function renderTable(data) {
      if (!data || !data.length) {
        tableBody.innerHTML = `<tr><td colspan="5" class="empty-state">${fullData.length === 0 ? 'Uvezite Excel datoteku' : 'Nema artikala za odabrane filtere'}</td></tr>`;
        return;
      }
      tableBody.innerHTML = data.map(row => `<tr>
        <td><strong>${row.awtSifra || ''}</strong></td>
        <td>${row.artikl || ''}</td>
        <td>${row.ean || ''}</td>
        <td><span class="badge-vrsta">${row.vrsta || ''}</span></td>
        <td><span class="badge-podvrsta">${row.podvrsta || ''}</span></td>
      </tr>`).join('');
    }

    // ---------- Glavni render ----------
    function render() {
      let loc = locationInput.value.trim();
      if (loc && !locationSet.has(loc)) {
        const match = Array.from(locationSet).find(l => l.toLowerCase().includes(loc.toLowerCase()));
        if (match) { loc = match; locationInput.value = match; }
        else loc = '';
      } else if (!loc || !locationSet.has(loc)) loc = '';

      currentLocation = loc;
      updateAddressDisplay(loc);

      if (!loc || fullData.length === 0) {
        const emptyMsg = fullData.length === 0 ? 'Uvezite Excel datoteku' : 'Odaberite lokaciju';
        cardsContainer.innerHTML = `<div class="empty-state">${emptyMsg}</div>`;
        tableBody.innerHTML = `<tr><td colspan="5" class="empty-state">${emptyMsg}</td></tr>`;
        itemCount.textContent = '0 artikala';
        return;
      }

      let filtered = fullData.filter(row => row.lokacija === loc);
      const vrstaFilter = filterVrsta.value;
      if (vrstaFilter) filtered = filtered.filter(row => row.vrsta === vrstaFilter);
      const podFilter = filterPodvrsta.value;
      if (podFilter) filtered = filtered.filter(row => row.podvrsta === podFilter);

      filtered.sort((a,b) => (a.vrsta||'').localeCompare(b.vrsta||'hr') || (a.podvrsta||'').localeCompare(b.podvrsta||'hr'));

      itemCount.textContent = `${filtered.length} artikala`;

      if (currentView === 'cards') {
        cardsContainer.style.display = 'block';
        tableContainer.style.display = 'none';
        renderCards(filtered);
      } else {
        cardsContainer.style.display = 'none';
        tableContainer.style.display = 'block';
        renderTable(filtered);
      }
    }

    // ---------- View toggle ----------
    viewCardsBtn.addEventListener('click', () => {
      currentView = 'cards';
      viewCardsBtn.className = 'active';
      viewTableBtn.className = '';
      render();
    });

    viewTableBtn.addEventListener('click', () => {
      currentView = 'table';
      viewTableBtn.className = 'active';
      viewCardsBtn.className = '';
      render();
    });

    // ---------- Process Excel Data ----------
    async function processExcelData(workbook, sourceName = '') {
      const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(firstSheet, { defval: '' });
      if (!json || !json.length) { alert('Excel datoteka je prazna ili neispravna.'); return false; }

      const headers = Object.keys(json[0]);
      const findKey = (patterns) => {
        for (const p of patterns) {
          const found = headers.find(h => h.trim().toUpperCase() === p.toUpperCase());
          if (found) return found;
        }
        return null;
      };

      const keyLokacija = findKey(['LOKACIJA']);
      const keyAdresa = findKey(['ADRESA']);
      const keyGrad = findKey(['GRAD']);
      const keyAwtSifra = findKey(['AWT ŠIFRA']);
      const keyArtikl = findKey(['ARTIKL']);
      const keyEAN = findKey(['EAN']);
      const keyVrsta = findKey(['VRSTA']);
      const keyPodvrsta = findKey(['PODVRSTA']);

      if (!keyLokacija || !keyAdresa || !keyGrad || !keyAwtSifra || !keyArtikl || !keyEAN) {
        alert('Neki očekivani stupci nisu pronađeni. Provjerite header: LOKACIJA, ADRESA, GRAD, AWT ŠIFRA, ARTIKL, EAN, VRSTA, PODVRSTA');
        return false;
      }

      const newData = [];
      const locSet = new Set();
      const locMap = new Map();

      for (const row of json) {
        const lokacija = normalizeStr(row[keyLokacija]);
        if (!lokacija) continue;
        const adresa = normalizeStr(row[keyAdresa]);
        const grad = normalizeStr(row[keyGrad]);
        locSet.add(lokacija);
        if (!locMap.has(lokacija)) locMap.set(lokacija, { adresa, grad });
        else {
          const ex = locMap.get(lokacija);
          if (!ex.adresa && adresa) ex.adresa = adresa;
          if (!ex.grad && grad) ex.grad = grad;
        }
        const awtSifra = normalizeStr(row[keyAwtSifra]);
        const artikl = normalizeStr(row[keyArtikl]);
        const ean = normalizeStr(row[keyEAN]);
        const vrsta = normalizeStr(row[keyVrsta] || '');
        const podvrsta = normalizeStr(row[keyPodvrsta] || '');
        if (awtSifra || artikl || ean) {
          newData.push({ lokacija, adresa, grad, awtSifra, artikl, ean, vrsta, podvrsta });
        }
      }

      if (!newData.length) { alert('Nema valjanih podataka za uvoz.'); return false; }

      fullData = newData;
      locationSet = locSet;
      locationMap = locMap;

      await saveAllData(fullData);
      updateSaveStatus(true);
      updateLocationDatalist();
      populateFilters();
      updateDataInfo();
      fileStatus.textContent = sourceName ? `✅ ${fullData.length} redova (${sourceName})` : `✅ ${fullData.length} redova`;

      const savedLoc = localStorage.getItem('asortimanSelectedLocation');
      if (savedLoc && locationSet.has(savedLoc)) locationInput.value = savedLoc;
      else if (locationSet.size === 1) { locationInput.value = Array.from(locationSet)[0]; localStorage.setItem('asortimanSelectedLocation', locationInput.value); }
      else locationInput.value = '';
      render();
      return true;
    }

    // ---------- GitHub Import ----------
    async function importFromGitHub(url) {
      githubStatus.textContent = '⏳ Preuzimanje datoteke...';
      githubStatus.className = 'status loading';
      
      try {
        let finalUrl = url;
        if (url.includes('github.com') && !url.includes('raw.githubusercontent.com')) {
          finalUrl = url.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
        }
        
        const response = await fetch(finalUrl);
        if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        
        const contentType = response.headers.get('content-type') || '';
        let data;
        
        if (contentType.includes('json') || url.endsWith('.json')) {
          const jsonData = await response.json();
          if (!Array.isArray(jsonData)) throw new Error('JSON nije niz podataka');
          fullData = jsonData;
          locationSet = new Set();
          locationMap = new Map();
          for (const row of fullData) {
            locationSet.add(row.lokacija);
            if (!locationMap.has(row.lokacija)) locationMap.set(row.lokacija, { adresa: row.adresa || '', grad: row.grad || '' });
          }
          await saveAllData(fullData);
          updateLocationDatalist();
          populateFilters();
          updateDataInfo();
          updateSaveStatus(true);
          fileStatus.textContent = `✅ ${fullData.length} redova (GitHub JSON)`;
          const savedLoc = localStorage.getItem('asortimanSelectedLocation');
          if (savedLoc && locationSet.has(savedLoc)) locationInput.value = savedLoc;
          else if (locationSet.size === 1) { locationInput.value = Array.from(locationSet)[0]; localStorage.setItem('asortimanSelectedLocation', locationInput.value); }
          render();
          githubStatus.textContent = `✅ Uspješno uvezeno ${fullData.length} artikala`;
          githubStatus.className = 'status success';
          return;
        }
        
        const arrayBuffer = await response.arrayBuffer();
        const workbook = XLSX.read(arrayBuffer, { type: 'array' });
        const success = await processExcelData(workbook, 'GitHub');
        if (success) {
          githubStatus.textContent = `✅ Uspješno uvezeno ${fullData.length} artikala`;
          githubStatus.className = 'status success';
        } else {
          githubStatus.textContent = '❌ Greška pri obradi Excel datoteke';
          githubStatus.className = 'status error';
        }
      } catch (error) {
        console.error('GitHub import error:', error);
        githubStatus.textContent = `❌ Greška: ${error.message}`;
        githubStatus.className = 'status error';
      }
    }

    // ---------- Load from DB ----------
    async function loadFromDB() {
      try {
        const data = await loadAllData();
        if (!data || !data.length) return false;
        fullData = data;
        locationSet = new Set();
        locationMap = new Map();
        for (const row of fullData) {
          locationSet.add(row.lokacija);
          if (!locationMap.has(row.lokacija)) locationMap.set(row.lokacija, { adresa: row.adresa || '', grad: row.grad || '' });
        }
        updateLocationDatalist();
        populateFilters();
        updateDataInfo();
        updateSaveStatus(true);
        fileStatus.textContent = `📂 ${fullData.length} redova (DB)`;
        const savedLoc = localStorage.getItem('asortimanSelectedLocation');
        if (savedLoc && locationSet.has(savedLoc)) locationInput.value = savedLoc;
        else if (locationSet.size === 1) { locationInput.value = Array.from(locationSet)[0]; localStorage.setItem('asortimanSelectedLocation', locationInput.value); }
        render();
        return true;
      } catch(e) { console.warn('DB load error', e); return false; }
    }

    // ---------- Backup / Restore ----------
    backupBtn.addEventListener('click', async () => {
      const data = await loadAllData();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `asortiman_backup_${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    });

    restoreBtn.addEventListener('click', () => restoreInput.click());
    restoreInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const text = await file.text();
      try {
        const data = JSON.parse(text);
        if (!Array.isArray(data) || !data.length) { alert('Neispravan JSON.'); return; }
        fullData = data;
        locationSet = new Set();
        locationMap = new Map();
        for (const row of fullData) {
          locationSet.add(row.lokacija);
          if (!locationMap.has(row.lokacija)) locationMap.set(row.lokacija, { adresa: row.adresa || '', grad: row.grad || '' });
        }
        await saveAllData(fullData);
        updateLocationDatalist();
        populateFilters();
        updateDataInfo();
        updateSaveStatus(true);
        fileStatus.textContent = `📂 ${fullData.length} redova (restore)`;
        const savedLoc = localStorage.getItem('asortimanSelectedLocation');
        if (savedLoc && locationSet.has(savedLoc)) locationInput.value = savedLoc;
        else if (locationSet.size === 1) { locationInput.value = Array.from(locationSet)[0]; localStorage.setItem('asortimanSelectedLocation', locationInput.value); }
        render();
        alert('Restore uspješan!');
      } catch(err) { alert('Greška pri restore: ' + err.message); }
      restoreInput.value = '';
    });

    // ---------- Clear ----------
    clearDataBtn.addEventListener('click', async () => {
      if (!fullData.length) return;
      if (!confirm('Obrisati sve podatke?')) return;
      await clearAllDataDB();
      fullData = []; locationSet.clear(); locationMap.clear();
      localStorage.removeItem('asortimanSelectedLocation');
      locationInput.value = '';
      updateLocationDatalist();
      populateFilters();
      updateDataInfo();
      updateSaveStatus(false);
      fileStatus.textContent = 'nema datoteke';
      render();
    });

    // ---------- Events ----------
    fileInput.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async function(ev) {
        try {
          const data = new Uint8Array(ev.target.result);
          const workbook = XLSX.read(data, { type: 'array' });
          await processExcelData(workbook, file.name);
          fileStatus.textContent = `📄 ${file.name}`;
        } catch(err) { alert('Greška pri čitanju: ' + err.message); }
      };
      reader.readAsArrayBuffer(file);
    });

    importBtn.addEventListener('click', () => fileInput.click());

    githubImportBtn.addEventListener('click', () => {
      const url = githubUrl.value.trim();
      if (!url) {
        githubStatus.textContent = '⚠️ Molimo unesite URL';
        githubStatus.className = 'status error';
        return;
      }
      importFromGitHub(url);
    });

    githubUrl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') githubImportBtn.click();
    });

    locationInput.addEventListener('input', function() {
      const val = this.value.trim();
      if (val === '') { localStorage.removeItem('asortimanSelectedLocation'); render(); return; }
      if (locationSet.has(val)) {
        localStorage.setItem('asortimanSelectedLocation', val);
        render();
      } else {
        const matches = Array.from(locationSet).filter(l => l.toLowerCase().includes(val.toLowerCase()));
        if (matches.length === 1) {
          this.value = matches[0];
          localStorage.setItem('asortimanSelectedLocation', matches[0]);
          render();
        } else {
          cardsContainer.innerHTML = `<div class="empty-state">Napišite više za precizniji odabir</div>`;
          tableBody.innerHTML = `<tr><td colspan="5" class="empty-state">Napišite više za precizniji odabir</td></tr>`;
          itemCount.textContent = '0 artikala';
          updateAddressDisplay('');
        }
      }
    });

    locationInput.addEventListener('change', function() {
      const val = this.value.trim();
      if (locationSet.has(val)) {
        localStorage.setItem('asortimanSelectedLocation', val);
        render();
      } else {
        const match = Array.from(locationSet).find(l => l.toLowerCase() === val.toLowerCase());
        if (match) { this.value = match; localStorage.setItem('asortimanSelectedLocation', match); render(); }
        else {
          const partial = Array.from(locationSet).find(l => l.toLowerCase().includes(val.toLowerCase()));
          if (partial) { this.value = partial; localStorage.setItem('asortimanSelectedLocation', partial); render(); }
          else render();
        }
      }
    });

    filterVrsta.addEventListener('change', () => { updatePodvrstaFilter(); render(); });
    filterPodvrsta.addEventListener('change', render);
    resetBtn.addEventListener('click', () => {
      filterVrsta.value = ''; filterPodvrsta.value = '';
      updatePodvrstaFilter();
      render();
    });

    // ---------- Init ----------
    loadFromDB();

    // ---------- Service Worker ----------
    if ('serviceWorker' in navigator) {
      const swCode = `const CACHE="asortiman-v2"; const FILES=["./"]; self.addEventListener("install",e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(FILES)))); self.addEventListener("fetch",e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
      const blob = new Blob([swCode], { type: 'text/javascript' });
      const url = URL.createObjectURL(blob);
      navigator.serviceWorker.register(url).catch(() => {});
    }

  })();
</script>
